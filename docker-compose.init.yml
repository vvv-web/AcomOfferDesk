services:
  keycloak_db_prepare:
    image: postgres:16-alpine
    container_name: keycloak_db_prepare
    env_file:
      - ./backend/.env
    entrypoint:
      - /bin/sh
      - -ec
    command:
      - |
        until pg_isready -h "$$KC_DB_URL_HOST" -p "$$KC_DB_URL_PORT" -U "$$KC_DB_USERNAME" -d "$$KC_DB_URL_DATABASE"; do
          sleep 2
        done
        PGPASSWORD="$$KC_DB_PASSWORD" psql \
          -h "$$KC_DB_URL_HOST" \
          -p "$$KC_DB_URL_PORT" \
          -U "$$KC_DB_USERNAME" \
          -d "$$KC_DB_URL_DATABASE" \
          -v ON_ERROR_STOP=1 \
          -c "CREATE SCHEMA IF NOT EXISTS \"$$KC_DB_SCHEMA\" AUTHORIZATION \"$$KC_DB_USERNAME\";"
    restart: "no"
    networks:
      - project_net

  keycloak_bootstrap:
    image: quay.io/keycloak/keycloak:26.5
    container_name: keycloak_bootstrap
    env_file:
      - ./backend/.env
    entrypoint:
      - /bin/sh
      - /opt/keycloak/bootstrap/bootstrap.sh
    volumes:
      - ./infra/keycloak/bootstrap.sh:/opt/keycloak/bootstrap/bootstrap.sh:ro
    depends_on:
      keycloak_db_prepare:
        condition: service_completed_successfully
    restart: "no"
    networks:
      - project_net

networks:
  project_net:
    name: project_net
    external: true
