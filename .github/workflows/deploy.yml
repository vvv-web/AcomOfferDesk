name: Deploy to VPS

on:
  push:
    branches:
      - test
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: 22
          command_timeout: 20m
          script: |
            set -e
            cd /opt/acome-offer-desk
            git fetch upstream
            git checkout test
            git pull upstream test
            docker compose down --remove-orphans || true
            docker compose -f docker-compose.init.yml up keycloak_db_prepare
            if ! docker compose up -d --build; then
              echo "=== docker compose ps -a ==="
              docker compose ps -a || true
              echo "=== keycloak logs (tail) ==="
              docker compose logs --tail=160 keycloak || true
              echo "=== backend logs (tail) ==="
              docker compose logs --tail=160 backend || true
              exit 1
            fi
            if ! docker compose -f docker-compose.init.yml up keycloak_bootstrap; then
              echo "=== keycloak bootstrap logs (tail) ==="
              docker compose -f docker-compose.init.yml logs --tail=160 keycloak_bootstrap || true
              echo "=== keycloak logs (tail) ==="
              docker compose logs --tail=160 keycloak || true
              exit 1
            fi
