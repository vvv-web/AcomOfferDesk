map $http_x_forwarded_proto $proxy_forwarded_proto {
  default $http_x_forwarded_proto;
  "" $scheme;
}

map $host $proxy_effective_forwarded_proto {
  ~*\.ngrok-free\.dev$ https;
  default $proxy_forwarded_proto;
}

map $http_x_forwarded_host $proxy_forwarded_host {
  default $http_x_forwarded_host;
  "" $http_host;
}

map $http_x_forwarded_port $proxy_forwarded_port {
  default $http_x_forwarded_port;
  "" $server_port;
}

map $proxy_effective_forwarded_proto $proxy_effective_forwarded_port {
  https 443;
  default $proxy_forwarded_port;
}

server {
  listen 80;
  server_name _;
  gzip on;
  gzip_vary on;
  gzip_min_length 1024;
  gzip_proxied any;
  gzip_types
    text/plain
    text/css
    text/javascript
    application/javascript
    application/json
    image/svg+xml
    font/woff
    font/woff2;

  # === API ===
  location /api/ {
    proxy_pass http://backend:8000/api/;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $proxy_forwarded_host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $proxy_effective_forwarded_proto;
    proxy_set_header X-Forwarded-Host $proxy_forwarded_host;
    proxy_set_header X-Forwarded-Port $proxy_effective_forwarded_port;
  }

  # === Keycloak IAM ===
  location /iam/resources/ {
    proxy_pass http://keycloak:8080/iam/resources/;
    proxy_http_version 1.1;
    proxy_set_header Host $proxy_forwarded_host;
    proxy_set_header X-Forwarded-Host $proxy_forwarded_host;
    proxy_set_header X-Forwarded-Proto $proxy_effective_forwarded_proto;
    proxy_set_header X-Forwarded-Port $proxy_effective_forwarded_port;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_buffering off;
    proxy_request_buffering off;
    proxy_max_temp_file_size 0;
    expires 7d;
    add_header Cache-Control "public, max-age=604800, immutable" always;
  }

  location /iam/ {
    proxy_pass http://keycloak:8080/iam/;
    proxy_http_version 1.1;
    proxy_set_header Host $proxy_forwarded_host;
    proxy_set_header X-Forwarded-Host $proxy_forwarded_host;
    proxy_set_header X-Forwarded-Proto $proxy_effective_forwarded_proto;
    proxy_set_header X-Forwarded-Port $proxy_effective_forwarded_port;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_buffering off;
    proxy_request_buffering off;
    proxy_max_temp_file_size 0;
  }

  # === Health check backend ===
  location /health {
    proxy_pass http://backend:8000/health;
    proxy_set_header Host $proxy_forwarded_host;
    proxy_set_header X-Forwarded-Proto $proxy_effective_forwarded_proto;
    proxy_set_header X-Forwarded-Host $proxy_forwarded_host;
    proxy_set_header X-Forwarded-Port $proxy_effective_forwarded_port;
  }

  # === Frontend SPA ===
  location / {
    proxy_pass http://web:80/;
    proxy_set_header Host $proxy_forwarded_host;
    proxy_set_header X-Forwarded-Proto $proxy_effective_forwarded_proto;
    proxy_set_header X-Forwarded-Host $proxy_forwarded_host;
    proxy_set_header X-Forwarded-Port $proxy_effective_forwarded_port;
  }
}
