services:
  backend:
    build: .
    container_name: backend
    env_file: .env
    volumes:
      - ./uploads:/app/uploads
    networks:
      - project_net

  gateway:
    image: nginx:1.27-alpine
    container_name: gateway
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    ports:
      - "8080:80"   # локально проверять можно через http://localhost:8080
    networks:
      - project_net

networks:
  project_net:
    external: true
    name: project_net