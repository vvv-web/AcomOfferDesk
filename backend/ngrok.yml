# authtoken берётся из env: NGROK_AUTHTOKEN (добавить в backend/.env)
# pooling_enabled: при ERR_NGROK_334 — позволяет работать двум туннелям на одном URL
version: "2"

tunnels:
  web:
    proto: http
    addr: gateway:80
    # Разрешает объединение с другим туннелем на том же URL (load balance)
    pooling_enabled: true
