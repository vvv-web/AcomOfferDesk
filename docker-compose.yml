services:
  keycloak:
    image: quay.io/keycloak/keycloak:26.5
    container_name: keycloak
    env_file:
      - ./backend/.env
    entrypoint:
      - /bin/sh
      - -ec
    command:
      - |
        sh /opt/keycloak/bootstrap/prepare-theme.sh
        exec /opt/keycloak/bin/kc.sh "${KEYCLOAK_START_COMMAND:-start-dev}" --import-realm
    volumes:
      - ./infra/keycloak/realm-import:/opt/keycloak/data/import:ro
      - ./infra/keycloak/themes:/opt/keycloak/themes-src:ro0
      - ./infra/keycloak/prepare-theme.sh:/opt/keycloak/bootstrap/prepare-theme.sh:ro
      - keycloak_data:/opt/keycloak/data
    healthcheck:
      test:
        [
          "CMD",
          "bash",
          "-ec",
          "management_port=\"$${KC_HTTP_MANAGEMENT_PORT:-9000}\"; management_prefix=\"$${KC_HTTP_MANAGEMENT_RELATIVE_PATH:-}\"; if [ -z \"$$management_prefix\" ]; then management_prefix=\"$${KC_HTTP_RELATIVE_PATH:-}\"; fi; if [ -z \"$$management_prefix\" ] || [ \"$$management_prefix\" = \"/\" ]; then health_path=\"/health/ready\"; else health_path=\"$${management_prefix%/}/health/ready\"; fi; exec 3<>/dev/tcp/127.0.0.1/$$management_port; printf 'HEAD %s HTTP/1.0\\r\\n\\r\\n' \"$$health_path\" >&3; grep '200' <&3",
        ]
      interval: 10s
      timeout: 5s
      retries: 20
    networks:
      - project_net

  backend:
    build: ./backend
    container_name: backend
    env_file:
      - ./backend/.env
    volumes:
      - ./shared:/app/shared:ro
    depends_on:
      keycloak:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/docs"]
      interval: 10s
      timeout: 5s
      retries: 12
    networks:
      - project_net

  web:
    build:
      context: ./web
    container_name: web
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pidof nginx >/dev/null && test -f /usr/share/nginx/html/index.html"]
      interval: 10s
      timeout: 5s
      retries: 12
    networks:
      - project_net

  gateway:
    image: nginx:1.27-alpine
    container_name: gateway
    restart: unless-stopped
    volumes:
      - ./backend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      keycloak:
        condition: service_healthy
      backend:
        condition: service_healthy
      web:
        condition: service_healthy
    ports:
      - "8080:80"
    networks:
      - project_net

  tg_bot:
    build: ./tg_bot
    container_name: tg_bot
    env_file:
      - ./tg_bot/.env
    depends_on:
      - gateway
    networks:
      - project_net

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 5s
      retries: 12
    networks:
      - project_net

  minio:
    image: minio/minio:latest
    container_name: minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/ready"]
      interval: 10s
      timeout: 5s
      retries: 12
    networks:
      - project_net

  notifications_worker:
    build:
      context: .
      dockerfile: notifications_worker/Dockerfile
    container_name: notifications_worker
    env_file:
      - ./backend/.env
    environment:
      - RABBITMQ_URL=${RABBITMQ_URL:-amqp://guest:guest@rabbitmq:5672/}
    volumes:
      - ./shared:/app/shared:ro
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - project_net

  ngrok:
    image: ngrok/ngrok:latest
    container_name: ngrok
    command: ["start", "--config", "/etc/ngrok.yml", "--all"]
    env_file:
      - ./backend/.env
    volumes:
      - ./backend/ngrok.yml:/etc/ngrok.yml:ro
    ports:
      - "4040:4040"
    profiles:
      - ngrok
    depends_on:
      - gateway
      - backend
      - minio
    networks:
      - project_net

  # TryCloudflare — 530 при нестабильном QUIC/HTTP2, ngrok — ERR_NGROK_9040 (блокировка IP)
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared
    command: ["tunnel", "--no-autoupdate", "--protocol", "http2", "--url", "http://gateway:80"]
    profiles:
      - tunnel
    depends_on:
      - gateway
    networks:
      - project_net

  # LocalTunnel — работает когда cloudflared 530, ngrok 9040 (блокировка IP)
  # URL: docker logs localtunnel 2>&1 | grep -E "your url|https://"
  localtunnel:
    image: node:20-alpine
    container_name: localtunnel
    command: ["sh", "-c", "npx -y localtunnel --port 80 --local-host gateway 2>&1 | tee /dev/stderr"]
    profiles:
      - tunnel
    depends_on:
      - gateway
    networks:
      - project_net

networks:
  project_net:
    name: project_net
    external: true

volumes:
  minio_data:
  keycloak_data:
