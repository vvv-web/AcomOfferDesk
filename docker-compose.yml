services:
  backend:
    build: ./backend
    container_name: backend
    env_file:
      - ./backend/.env
    volumes:
      - ./backend/uploads:/app/uploads
      - ./shared:/app/shared:ro
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - project_net

  web:
    build: ./web
    container_name: web
    depends_on:
      - backend
    networks:
      - project_net

  gateway:
    image: nginx:1.27-alpine
    container_name: gateway
    volumes:
      - ./backend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - web
    ports:
      - "8080:80"
    networks:
      - project_net

  tg_bot:
    build: ./tg_bot
    container_name: tg_bot
    env_file:
      - ./tg_bot/.env
    depends_on:
      - gateway
    networks:
      - project_net

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 5s
      retries: 12
    networks:
      - project_net

  notifications_worker:
    build:
      context: .
      dockerfile: notifications_worker/Dockerfile
    container_name: notifications_worker
    env_file:
      - ./backend/.env
    environment:
      - RABBITMQ_URL=${RABBITMQ_URL:-amqp://guest:guest@rabbitmq:5672/}
    volumes:
      - ./shared:/app/shared:ro
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - project_net

  ngrok:
    image: ngrok/ngrok:latest
    container_name: ngrok
    command: ["start", "--config", "/etc/ngrok.yml", "public"]
    env_file:
      - ./backend/.env
    volumes:
      - ./backend/ngrok.yml:/etc/ngrok.yml:ro
    ports:
      - "4040:4040"
    profiles:
      - ngrok
    depends_on:
      - gateway
    networks:
      - project_net

networks:
  project_net:
    external: true
    name: project_net
