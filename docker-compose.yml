x-runtime-env: &runtime-env
  env_file:
    - ${APP_RUNTIME_ENV_FILE:-./.env}

services:
  keycloak:
    <<: *runtime-env
    image: quay.io/keycloak/keycloak:26.5
    container_name: keycloak
    entrypoint:
      - /bin/sh
      - -ec
    command:
      - |
        sh /opt/keycloak/bootstrap/prepare-theme.sh
        exec /opt/keycloak/bin/kc.sh "${KEYCLOAK_START_COMMAND:-start}" --import-realm
    volumes:
      - ./infra/keycloak/realm-import:/opt/keycloak/data/import:ro
      - ./infra/keycloak/themes:/opt/keycloak/themes-src:ro
      - ./infra/keycloak/prepare-theme.sh:/opt/keycloak/bootstrap/prepare-theme.sh:ro
      - keycloak_data:/opt/keycloak/data
    expose:
      - "8080"
    healthcheck:
      test:
        [
          "CMD",
          "bash",
          "-ec",
          "management_port=\"$${KC_HTTP_MANAGEMENT_PORT:-9000}\"; management_prefix=\"$${KC_HTTP_MANAGEMENT_RELATIVE_PATH:-}\"; if [ -z \"$$management_prefix\" ]; then management_prefix=\"$${KC_HTTP_RELATIVE_PATH:-}\"; fi; if [ -z \"$$management_prefix\" ] || [ \"$$management_prefix\" = \"/\" ]; then health_path=\"/health/ready\"; else health_path=\"$${management_prefix%/}/health/ready\"; fi; exec 3<>/dev/tcp/127.0.0.1/$$management_port; printf 'HEAD %s HTTP/1.0\\r\\n\\r\\n' \"$$health_path\" >&3; grep '200' <&3",
        ]
      interval: 10s
      timeout: 5s
      retries: 20
    networks:
      - project_net

  backend:
    <<: *runtime-env
    build: ./backend
    container_name: backend
    volumes:
      - ./shared:/app/shared:ro
    depends_on:
      keycloak:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      minio:
        condition: service_healthy
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/docs"]
      interval: 10s
      timeout: 5s
      retries: 12
    networks:
      - project_net

  web:
    build:
      context: ./web
    container_name: web
    depends_on:
      backend:
        condition: service_healthy
    expose:
      - "80"
    healthcheck:
      test: ["CMD-SHELL", "pidof nginx >/dev/null && test -f /usr/share/nginx/html/index.html"]
      interval: 10s
      timeout: 5s
      retries: 12
    networks:
      - project_net

  gateway:
    image: nginx:1.27-alpine
    container_name: gateway
    restart: unless-stopped
    volumes:
      - ./backend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      keycloak:
        condition: service_healthy
      backend:
        condition: service_healthy
      web:
        condition: service_healthy
    expose:
      - "80"
    networks:
      - project_net

  # LEGACY Telegram bot service. Keep this block for quick rollback.
  # To restore:
  # 1) uncomment this service
  # 2) provide ./tg_bot/.env
  # 3) enable LEGACY_TELEGRAM_ENABLED=true in the selected root runtime env file
  # tg_bot:
  #   build: ./tg_bot
  #   container_name: tg_bot
  #   env_file:
  #     - ./tg_bot/.env
  #   depends_on:
  #     - gateway
  #   networks:
  #     - project_net

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:?Set RABBITMQ_DEFAULT_USER in the selected env file}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:?Set RABBITMQ_DEFAULT_PASS in the selected env file}
    expose:
      - "5672"
      - "15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 5s
      retries: 12
    networks:
      - project_net

  minio:
    image: minio/minio:latest
    container_name: minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?Set MINIO_ROOT_USER in the selected env file}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?Set MINIO_ROOT_PASSWORD in the selected env file}
    expose:
      - "9000"
      - "9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/ready"]
      interval: 10s
      timeout: 5s
      retries: 12
    networks:
      - project_net

  notifications_worker:
    <<: *runtime-env
    build:
      context: .
      dockerfile: notifications_worker/Dockerfile
    container_name: notifications_worker
    restart: unless-stopped
    volumes:
      - ./shared:/app/shared:ro
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - project_net

networks:
  project_net:
    name: project_net
    external: true

volumes:
  minio_data:
  keycloak_data:
